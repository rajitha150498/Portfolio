<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodTune — Find Your Sound</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #10101c;
      --card: #14141f;
      --border: rgba(255,255,255,0.07);
      --text: #f0eef8;
      --muted: #6b6880;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      /* mood colors - change dynamically */
      --mood-a: #ff6b6b;
      --mood-b: #ff9f43;
      --glow: rgba(255,107,107,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.6s ease;
    }

    /* animated bg blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
      transition: background 0.8s ease, opacity 0.8s ease;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: var(--mood-a);
      top: -150px; left: -150px;
      animation: drift1 12s ease-in-out infinite;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: var(--mood-b);
      bottom: -100px; right: -100px;
      animation: drift2 15s ease-in-out infinite;
    }
    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(60px, 40px) scale(1.1); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(-40px, -60px) scale(1.15); }
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 10;
      padding: 2rem 3rem 0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--mood-a); transition: color 0.6s; }
    .tagline {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 10;
      text-align: center;
      padding: 4rem 2rem 3rem;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    .hero h1 .highlight {
      background: linear-gradient(135deg, var(--mood-a), var(--mood-b));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: background 0.6s;
    }
    .hero p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── MOOD PICKER ── */
    .mood-section {
      position: relative; z-index: 10;
      padding: 0 2rem 3rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .mood-label {
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .mood-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 1rem;
    }
    .mood-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s ease;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem;
      position: relative; overflow: hidden;
    }
    .mood-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--ma), var(--mb));
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: inherit;
    }
    .mood-btn:hover::before, .mood-btn.active::before { opacity: 0.15; }
    .mood-btn:hover { transform: translateY(-4px); border-color: var(--ma); }
    .mood-btn.active {
      border-color: var(--ma);
      box-shadow: 0 0 24px var(--ma-glow, rgba(255,255,255,0.1));
    }
    .mood-emoji {
      font-size: 2rem;
      position: relative; z-index: 1;
      transition: transform 0.3s;
    }
    .mood-btn:hover .mood-emoji, .mood-btn.active .mood-emoji { transform: scale(1.2); }
    .mood-name {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      position: relative; z-index: 1;
      color: var(--text);
    }
    .mood-desc {
      font-size: 0.7rem;
      color: var(--muted);
      position: relative; z-index: 1;
    }

    /* ── RESULTS ── */
    .results-section {
      position: relative; z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
      display: none;
    }
    .results-section.visible { display: block; }

    .results-header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .mood-badge {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--mood-a), var(--mood-b));
      color: #fff;
      font-weight: 500;
    }
    .results-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
    }
    .vibe-text {
      font-size: 0.85rem;
      color: var(--muted);
      margin-left: auto;
      font-style: italic;
    }

    /* song cards */
    .songs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .song-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem;
      display: flex; align-items: center; gap: 1rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.22s ease;
      animation: slideUp 0.4s ease both;
      position: relative; overflow: hidden;
    }
    .song-card::after {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--mood-a), var(--mood-b));
      border-radius: 3px 0 0 3px;
      transition: width 0.2s;
    }
    .song-card:hover {
      transform: translateX(6px);
      border-color: rgba(255,255,255,0.15);
      background: #1a1a28;
    }
    .song-card:hover::after { width: 5px; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .song-thumb {
      width: 52px; height: 52px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--mood-a), var(--mood-b));
      opacity: 0.85;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-weight: 500;
      font-size: 0.92rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 0.2rem;
    }
    .song-artist {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-arrow {
      color: var(--muted);
      font-size: 1rem;
      flex-shrink: 0;
      transition: transform 0.2s, color 0.2s;
    }
    .song-card:hover .song-arrow { transform: translateX(4px); color: var(--mood-a); }

    /* vibe description card */
    .vibe-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.8rem;
      display: flex; align-items: center; gap: 1.2rem;
    }
    .vibe-icon { font-size: 2.4rem; }
    .vibe-card h3 {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
    }
    .vibe-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

    /* footer */
    footer {
      position: relative; z-index: 10;
      text-align: center;
      padding: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--mood-a); text-decoration: none; transition: opacity 0.2s; }
    footer a:hover { opacity: 0.7; }

    @media (max-width: 600px) {
      header { padding: 1.5rem 1.2rem 0; }
      .hero { padding: 3rem 1.2rem 2rem; }
      .mood-section, .results-section { padding-left: 1.2rem; padding-right: 1.2rem; }
      .mood-grid { grid-template-columns: repeat(3, 1fr); gap: 0.7rem; }
      .mood-btn { padding: 1rem 0.6rem; border-radius: 12px; }
      .mood-emoji { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <div class="logo">Mood<span>Tune</span></div>
  <div class="tagline">Find your sound</div>
</header>

<section class="hero">
  <h1>How are you<br><span class="highlight" id="heroHighlight">feeling today?</span></h1>
  <p>Pick your mood and we'll curate the perfect playlist vibe for you — with real songs on YouTube.</p>
</section>

<section class="mood-section">
  <div class="mood-label">— choose a mood —</div>
  <div class="mood-grid" id="moodGrid"></div>
</section>

<section class="results-section" id="results">
  <div class="results-header">
    <div class="mood-badge" id="resultsBadge">Happy</div>
    <div class="results-title" id="resultsTitle">Your playlist vibe</div>
    <div class="vibe-text" id="vibeText"></div>
  </div>

  <div class="vibe-card" id="vibeCard">
    <div class="vibe-icon" id="vibeIcon"></div>
    <div>
      <h3 id="vibeHeading"></h3>
      <p id="vibeDesc"></p>
    </div>
  </div>

  <div class="songs-grid" id="songsGrid"></div>
</section>

<footer>
  Built with HTML · CSS · JavaScript &nbsp;·&nbsp;
  Made by <a href="#">Rajitha Reddy</a>
</footer>

  // Render mood buttons
  const grid = document.getElementById('moodGrid');
  moods.forEach(mood => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn';
    btn.dataset.id = mood.id;
    btn.style.setProperty('--ma', mood.colorA);
    btn.style.setProperty('--mb', mood.colorB);
    btn.style.setProperty('--ma-glow', mood.glow);
    btn.innerHTML = `
      <div class="mood-emoji">${mood.emoji}</div>
      <div class="mood-name">${mood.name}</div>
      <div class="mood-desc">${mood.desc}</div>
    `;
    btn.addEventListener('click', () => selectMood(mood, btn));
    grid.appendChild(btn);
  });

  function selectMood(mood, btn) {
    // update active button
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // update css vars
    document.documentElement.style.setProperty('--mood-a', mood.colorA);
    document.documentElement.style.setProperty('--mood-b', mood.colorB);
    document.documentElement.style.setProperty('--glow', mood.glow);

    // update hero
    document.getElementById('heroHighlight').textContent = `${mood.name.toLowerCase()} today?`;

    // update logo accent
    document.querySelector('.logo span').style.color = mood.colorA;

    // fill results
    document.getElementById('resultsBadge').textContent = mood.vibeLabel;
    document.getElementById('resultsBadge').style.background =
      `linear-gradient(135deg, ${mood.colorA}, ${mood.colorB})`;
    document.getElementById('resultsTitle').textContent = `Your ${mood.name.toLowerCase()} playlist`;
    document.getElementById('vibeText').textContent = `${mood.songs.length} songs picked for you`;
    document.getElementById('vibeIcon').textContent = mood.emoji;
    document.getElementById('vibeHeading').textContent = mood.vibeHeading;
    document.getElementById('vibeDesc').textContent = mood.vibeDesc;

    // render song cards
    const songsGrid = document.getElementById('songsGrid');
    songsGrid.innerHTML = '';
    mood.songs.forEach((song, i) => {
      const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(song.q)}`;
      const card = document.createElement('a');
      card.className = 'song-card';
      card.href = url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = `${i * 0.07}s`;
      card.innerHTML = `
        <div class="song-thumb">${mood.emoji}</div>
        <div class="song-info">
          <div class="song-title">${song.title}</div>
          <div class="song-artist">${song.artist}</div>
        </div>
        <div class="song-arrow">↗</div>
      `;
      songsGrid.appendChild(card);
    });

    // show results
    const results = document.getElementById('results');
    results.classList.add('visible');
    setTimeout(() => results.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
</script>
</body>
</html>
